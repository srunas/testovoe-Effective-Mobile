version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infrastructure/repository/subscription-repository/query.sql"
    schema: "migrations"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/infrastructure/repository/subscription-repository/sqlcgen"
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: true